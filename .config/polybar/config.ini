include-file = ~/.config/polybar/colors.ini
include-file = ~/.config/polybar/modules.ini

[global/wm]
margin-top = 5
margin-bottom = 0

[bar/i3]
monitor = ${env:MONITOR:}
width = 100%
height = 40
radius = 0
fixed-center = true

background = ${colors.background-no-compton}
foreground = ${colors.foreground}

line-size = 3
line-color = #f00

padding-left = 2
padding-right = 2

module-margin-left = 0
module-margin-right = 2

font-0 = "Cousine Nerd Font:size=10"
font-1 = "Fira Code:size=10;3"
font-2 = "Symbols Nerd Font:style=2048-em"
# font-2 = "FontAwesome:style=Solid:pixelsize=12;3"
# font-3 = "FontAwesome:style=Regular:pixelsize=10;3"
# font-4 = "FontAwesome:pixelsize=10;3"
# font-5 = "NotoEmoji Nerd Font Mono:style=Book:size=10;3"

modules-left = player-mpris-tail 
modules-center = i3
modules-right = pulseaudio battery memory cpu xkeyboard popup-calendar powermenu

tray-position = left
tray-padding = 2
tray-offset-x = 0
tray-offset-y = 0
tray-scale = 1.0

cursor-click = pointer
cursor-scroll = ns-resize
