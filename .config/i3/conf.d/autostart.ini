#############################################
# autostart applications/services on login: #
#############################################

# get auth work with polkit-gnome
exec_always --no-startup-id /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# dex execute .desktop files + apps using /etc/xdg/autostart.
# when second to i3 a DE is installed or mixed usage of i3 + xfce4 or GNOME
# in this cases better disable dex and use manual starting apps using xdg/autostart
# if enabled you should comment welcome app.
# https://github.com/jceb/dex
#exec --no-startup-id dex -a -s /etc/xdg/autostart/:~/.config/autostart/
# exec --no-startup-id dex --autostart --environment i3

# num lock activated
#exec --no-startup-id numlockx on
# exec_always --no-startup-id conky

# start a script to setup displays
# uncomment the next line, use arandr to setup displays and save the file as monitor:
# exec --no-startup-id ~/.screenlayout/monitor.sh

# set wallpaper
# exec --no-startup-id sleep 2 && nitrogen --restore
# exec --no-startup-id feh --bg-fill /usr/share/endeavouros/backgrounds/endeavouros_i3.png

# set powersavings for display:
# exec --no-startup-id xset s 480 dpms 600 600 600
# exec_always --no-startup-id xautolock -time 10 -locker "i3lock -c 000000 --keylayout 2; playerctl pause" -notifier "notify-send lock sequence initiated" -notify 30
exec_always --no-startup-id ~/.config/i3/scripts/xidlehook.sh

# disable power saving (for example if using xscreensaver)
#exec --no-startup-id xset -dpms

# use xautolock to use autosuspend rules for mobile devices
# https://wiki.archlinux.org/title/Session_lock#xautolock
#exec --no-startup-id xautolock -time 60 -locker "systemctl suspend"


# xscreensaver
# https://www.jwz.org/xscreensaver
#exec --no-startup-id xscreensaver --no-splash

# Desktop notifications
exec_always --no-startup-id dbus-launch dunst --config ~/.config/dunst/dunstrc
# alternative if you installed aside with XFCE4:
# exec --no-startup-id /usr/lib/xfce4/notifyd/xfce4-notifyd &

# autotiling script
# https://github.com/nwg-piotr/autotiling
# `yay -S autotiling ;) (it is in AUR)
#exec_always --no-startup-id autotiling

# Autostart apps as you like
exec_always --no-startup-id copyq
exec_always --no-startup-id source ~/.fehbg
###############
# system tray #
###############
# if you do not use dex: exec --no-startup-id dex --autostart --environment i3
# you need to have tray apps started manually one by one:

# start blueberry app for managing bluetooth devices from tray:
#exec --no-startup-id blueberry-tray

# networkmanager-applet
exec_always --no-startup-id nm-applet

# clipman-applet
#exec --no-startup-id xfce4-clipman
exec_always --no-startup-id ~/.config/polybar/launch.sh

# add hebrew keyboard layout
exec_always --no-startup-id setxkbmap -model pc104 -layout us,il -option grp:alt_shift_toggle

exec --no-startup-id keepassxc

exec_always --no-startup-id thunar --daemon
exec_always --no-startup-id opensnitch-ui

exec --no-startup-id sleep 5; aw-qt

# empty the trash
exec_always --no-startup-id /usr/bin/trash-empty 30

# get yadm updates
exec_always --no-startup-id yadm remote --verbose update

