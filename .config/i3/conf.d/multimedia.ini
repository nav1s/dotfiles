##########################################
# Multimedia Keys #
##########################################

# volume
bindsym XF86AudioRaiseVolume exec amixer -D pulse sset Master 5%+ && pkill -RTMIN+1 i3blocks
bindsym XF86AudioLowerVolume exec amixer -D pulse sset Master 5%- && pkill -RTMIN+1 i3blocks
# bindsym Ctrl+Up exec --no-startup-id amixer sset Master 3%+
# bindsym Ctrl+Down exec --no-startup-id amixer sset Master 3%-

# gradular volume control
bindsym $mod+XF86AudioRaiseVolume exec amixer -D pulse sset Master 1%+ && pkill -RTMIN+1 i3blocks
bindsym $mod+XF86AudioLowerVolume exec amixer -D pulse sset Master 1%- && pkill -RTMIN+1 i3blocks

bindsym Ctrl+Up exec amixer -D pulse sset Master 2%+
bindsym Ctrl+Down exec amixer -D pulse sset Master 2%-

# mute
bindsym XF86AudioMute exec amixer sset Master toggle && killall -USR1 i3blocks
bindsym Ctrl+m exec --no-startup-id amixer sset Master toggle

# audio control
bindsym XF86AudioPlay exec playerctl play
bindsym XF86AudioPause exec playerctl pause
bindsym XF86AudioNext exec playerctl next
bindsym XF86AudioPrev exec playerctl previous
bindsym Ctrl+space exec --no-startup-id playerctl play-pause
bindsym Ctrl+Right exec --no-startup-id playerctl next
bindsym Ctrl+Left exec --no-startup-id playerctl previous

# Set default sink
bindsym Ctrl+Shift+Up exec --no-startup-id pactl set-default-sink 50
bindsym Ctrl+Shift+Down exec --no-startup-id pactl set-default-sink 52

