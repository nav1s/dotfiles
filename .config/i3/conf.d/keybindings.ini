######################################
# keybindings for different actions: #
######################################

# set the mod key to the winkey:
set $mod Mod4

bindsym $mod+p move workspace to output next

# start a terminal
bindsym $mod+Return exec --no-startup-id kitty

# kill focused window
bindsym $mod+q kill

bindsym $mod+x exec --no-startup-id ~/.config/i3/scripts/i3-locked-improved.sh
bindsym $mod+Shift+x exec --no-startup-id i3lock -c 000000 --keylayout 2

# reload the configuration file
bindsym $mod+Shift+c reload

# restart i3 inplace (preserves your layout/session, can be used to update i3)
bindsym $mod+Shift+r restart

# keybinding in fancy rofi (automated):
bindsym $mod+F1 exec --no-startup-id ~/.config/i3/scripts/keyhint-2

# alternative
# keybinding list in editor:
# bindsym $mod+F1 exec --no-startup-id xed ~/.config/i3/keybindings

# Backlight control
# bindsym XF86MonBrightnessUp exec --no-startup-id xbacklight +5 && notify-send "Brightness - $(xbacklight -get | cut -c1-2)%"
# bindsym XF86MonBrightnessDown exec --no-startup-id xbacklight -5 && notify-send "Brightness - $(xbacklight -get | cut -c1-2)%"
bindsym XF86MonBrightnessUp exec --no-startup-id light -A 5
bindsym XF86MonBrightnessDown exec --no-startup-id light -U 5


# change focus
bindsym $mod+h focus left
bindsym $mod+j focus down
bindsym $mod+k focus up
bindsym $mod+l focus right

# move focused window
bindsym $mod+Shift+h move left
bindsym $mod+Shift+j move down
bindsym $mod+Shift+k move up
bindsym $mod+Shift+l move right

# split in horizontal orientation
bindsym $mod+c split h; exec --no-startup-id notify-send "tile horizontally"

# split in vertical orientation
bindsym $mod+v split v; exec --no-startup-id notify-send "tile vertically"

# enter fullscreen mode for the focused container
bindsym $mod+f fullscreen toggle

# change container layout (stacked, tabbed, toggle split)
bindsym $mod+s layout stacking
bindsym $mod+g layout tabbed
bindsym $mod+e layout toggle split

# toggle tiling / floating
bindsym $mod+Shift+space floating toggle

# change focus between tiling / floating windows
bindsym $mod+space focus mode_toggle

# focus the parent container
bindsym $mod+a focus parent

# move the currently focused window to the scratchpad
bindsym $mod+Shift+minus move scratchpad

# Show the next scratchpad window or hide the focused scratchpad window.
# If there are multiple scratchpad windows, this command cycles through them.
bindsym $mod+minus scratchpad show

# open new empty workspace
bindsym $mod+ctrl+n exec --no-startup-id ~/.config/i3/scripts/empty_workspace

bindsym $mod+Shift+a --release exec --no-startup-id "source ~/.config/i3/scripts/wallpaper/random_wallpaper.sh"

## App shortcuts
bindsym $mod+w exec --no-startup-id /usr/bin/firefox -P
bindsym $mod+n exec --no-startup-id /usr/bin/thunar
bindsym Print exec --no-startup-id flameshot gui
bindsym Shift+Print exec --no-startup-id "~/.config/i3/scripts/img2latex.fish"
bindsym Ctrl+Print exec --no-startup-id flameshot gui --invert --region 898x908+34+159

# volume controller
bindsym $mod+Ctrl+m exec --no-startup-id pavucontrol
# start xkill
bindsym $mod+Ctrl+x --release exec --no-startup-id xkill

# exit-menu
bindsym $mod+Shift+e exec --no-startup-id ~/.config/i3/scripts/powermenu

# rofi bindings fancy application menu ($mod+d /F9 optional disabled)
bindsym $mod+d exec --no-startup-id rofi -modi drun -show drun -config ~/.config/rofi/rofidmenu.rasi

# rofi bindings for window menu ($mod+t /F10 optional disabled)
bindsym $mod+t exec --no-startup-id rofi -show window -config ~/.config/rofi/rofidmenu.rasi

mode "pass-through" {
    bindsym $mod+Shift+t mode "default"
}

bindsym $mod+Shift+t mode "pass-through"

bindsym $mod+Shift+s exec --no-startup-id xrandr --output eDP --auto

bindsym $mod+shift+n mode "anki-utils"
mode "anki-utils" {
        bindsym a exec --no-startup-id ~/.config/i3/scripts/anki-utils/anki-find-dupe.fish; mode "default"
        bindsym s exec --no-startup-id ~/.config/i3/scripts/anki-utils/anki-remove-close.fish ; mode "default"
        bindsym d exec --no-startup-id ~/.config/i3/scripts/anki-utils/anki-correct-cloze.fish; mode "default"

        # exit anki-tools mode: Enter or Escape
        bindsym Return mode "default"
        bindsym Escape mode "default"
}

